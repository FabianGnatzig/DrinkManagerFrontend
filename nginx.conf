server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API routes to the backend
    location ~ ^/(beer|brewery|user|team|season|event|service|userbeer|bringbeer)/ {
        proxy_pass http://host.docker.internal:6969;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
